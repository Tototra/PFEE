name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================================================
  # Backend : lint + tests Python
  # ============================================================================
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff check)
        working-directory: backend
        run: ruff check app/ tests/

      - name: Format check (ruff format)
        working-directory: backend
        run: ruff format --check app/ tests/

      - name: Run tests
        working-directory: backend
        env:
          SECRET_KEY: test-secret-key-not-used-in-prod
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          MISTRAL_API_KEY: dummy
        run: pytest -v --cov=app --cov-report=term-missing

  # ============================================================================
  # Frontend : lint + type check + build
  # ============================================================================
  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Build
        working-directory: frontend
        run: npm run build

  # ============================================================================
  # Docker : valide que les images se construisent
  # ============================================================================
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/backend.Dockerfile
          push: false
          tags: coach-ia-gtb-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/frontend.Dockerfile
          push: false
          tags: coach-ia-gtb-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
